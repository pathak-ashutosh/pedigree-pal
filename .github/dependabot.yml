version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      hardhat:
        patterns: ["hardhat", "@nomicfoundation/*"]
    ignore:
      # Hardhat 3 requires an ESM migration; the V1 contract is frozen during the
      # SaaS migration, so hold at v2 until a deliberate upgrade.
      - dependency-name: hardhat
        update-types: ["version-update:semver-major"]
      - dependency-name: "@nomicfoundation/*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      frontend:
        patterns: ["*"]
    ignore:
      # vitest 4 / vite 8 majors change coverage measurement and trip the gate on
      # the frozen V1 dApp; hold them until a deliberate upgrade. Smaller bumps flow.
      - dependency-name: vitest
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: vite
        update-types: ["version-update:semver-major"]
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    groups:
      saas-web:
        patterns: ["*"]
    ignore:
      # ESLint 10 breaks eslint-config-next@16's bundled typescript-eslint.
      # Hold at v9 until eslint-config-next supports ESLint 10.
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
