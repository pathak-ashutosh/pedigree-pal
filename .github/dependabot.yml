version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    groups:
      saas-web:
        patterns: ["*"]
    ignore:
      # ESLint 10: eslint-config-next@16's bundled plugins (react, jsx-a11y,
      # import) have no ESLint 10 release yet. Hold at v9.
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
      # TypeScript 7 (native compiler port) breaks typescript-eslint, which caps
      # at <6.1.0. Hold at v5 until the lint toolchain supports it.
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
