version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    groups:
      saas-web:
        patterns: ["*"]
    ignore:
      # ESLint 10 breaks eslint-config-next@16's bundled typescript-eslint.
      # Hold at v9 until eslint-config-next supports ESLint 10.
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
