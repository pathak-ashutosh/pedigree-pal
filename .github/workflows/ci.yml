name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:coverage:contracts

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - run: npm run build

  saas-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: docker build -t pedigree-pal-web:ci .

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v3
        with:
          version: 2.109.1
      - run: supabase db start
      - run: supabase test db
      - run: supabase db lint --local --level warning

  production-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            apps/web/package-lock.json
      - run: npm ci
      - run: npm ci --prefix frontend
      - run: npm ci --prefix apps/web
      - run: npm audit --omit=dev --audit-level=high
      - run: npm audit --prefix frontend --omit=dev --audit-level=high
      - run: npm audit --prefix apps/web --omit=dev --audit-level=high
