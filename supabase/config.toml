project_id = "pedigree-pal"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = false

[local_smtp]
# Local-only mail catcher; magic-link sign-in is unusable without it because
# nothing else delivers the email. Web UI at http://127.0.0.1:54324.
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "25MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
# The app derives the callback origin from request headers, so allow both
# loopback spellings; a redirect that is not listed silently falls back to
# site_url and the sign-in never completes.
additional_redirect_urls = [
  "http://localhost:3000/**",
  "http://127.0.0.1:3000/**",
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
